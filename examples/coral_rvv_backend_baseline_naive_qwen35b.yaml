# Coral RVV Backend — Naive baseline (single-prompt LLM)
# Paired with coral_rvv_backend.yaml for cost comparison.

design:
  rtl_dir: "./coral_test/rvv_rtl"
  top_module: "rvv_backend_rob"
  docs_dir: "./coral_test/docs"

model:
  backend: "openai"
  id: "qwen3:35b-bf16"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 16384

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  naive_baseline: true
  use_ast_assertions: false
  ast_only: false
  use_dataflow_check: false
  use_rtl_facts: false
  module_facts_mode: "off"
  allow_pyslang_warnings: true
  use_hallucination_denylist: false

output:
  sva_file: "./coral_test/rvv_backend_baseline_naive_qwen35b_sva.sv"
  log_file: "./coral_test/rvv_backend_baseline_naive_qwen35b_log.txt"
  lint_report: "./coral_test/rvv_backend_baseline_naive_qwen35b_lint.json"
