# NVDLA Booth Recoder — historical Qwen3-14B int4 quantization run
# Kept for reference. Ollama serves GGUF Q4_K_M quantization which is
# the Ollama equivalent of this bitsandbytes NF4 configuration.

design:
  rtl_dir: "./nvdla_cmac_test/booth_rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_booth.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_booth"
  docs_dir: "./nvdla_cmac_test/booth_docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/booth_sva_output_14b_int4.sv"
  log_file: "./nvdla_cmac_test/booth_pipeline_14b_int4_log.txt"
  lint_report: "./nvdla_cmac_test/booth_lint_14b_int4.json"
