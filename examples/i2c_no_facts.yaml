# I2C-Master — SpecGuard with no-facts variant (current default).

design:
  rtl_dir: "./i2c_test/rtl"
  top_file: "i2c_master_top.v"
  top_module: "i2c_master_top"
  docs_dir: "./i2c_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  allow_pyslang_warnings: true

  use_rtl_facts: false
  module_facts_mode: "off"
  enable_deterministic_repair: true

  use_hallucination_denylist: false

output:
  sva_file: "./i2c_test/i2c_specguard_no_facts_sva.sv"
  log_file: "./i2c_test/i2c_specguard_no_facts_log.txt"
  lint_report: "./i2c_test/i2c_specguard_no_facts_lint.json"
