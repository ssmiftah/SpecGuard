# NVDLA CMAC — Ablation A1: Remove RTL facts card
# Disables the structured "RTL Facts" block injected into the system
# prompt. AST skeletons, module scoping (vacuous now), Phase 1 repair,
# and the lint feedback loop all remain ON. Compare token totals and
# ACR vs nvdla_cmac_full.yaml.

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "openai"
  id: "qwen3:35b-bf16"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 16384

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true

  use_rtl_facts: false           # <-- ablation knob
  module_facts_mode: "off"       # facts off implies scoping is vacuous

  enable_deterministic_repair: true
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/cmac_ablation_no_facts_qwen35b_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_ablation_no_facts_qwen35b_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_ablation_no_facts_qwen35b_lint.json"
