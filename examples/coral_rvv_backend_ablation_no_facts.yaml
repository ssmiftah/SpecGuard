# Coral RVV Backend — Ablation A1: Remove RTL facts card

design:
  rtl_dir: "./coral_test/rvv_rtl"
  top_module: "rvv_backend_rob"
  docs_dir: "./coral_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  ast_skip_trivial_internal: false
  allow_pyslang_warnings: true

  use_rtl_facts: false           # <-- ablation knob
  module_facts_mode: "off"

  enable_deterministic_repair: true
  use_hallucination_denylist: false

output:
  sva_file: "./coral_test/rvv_backend_ablation_no_facts_sva.sv"
  log_file: "./coral_test/rvv_backend_ablation_no_facts_log.txt"
  lint_report: "./coral_test/rvv_backend_ablation_no_facts_lint.json"
