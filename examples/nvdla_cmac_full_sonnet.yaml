# NVDLA CMAC — Full pipeline with Claude Sonnet 4.6 (Anthropic API)
#
# Prerequisite: export ANTHROPIC_API_KEY=sk-ant-...
# Pricing ref (as of 2026-04): Sonnet 4.6 ~ $3/MTok in, $15/MTok out.
# CMAC full pipeline on Ollama uses ~58K tokens; rough API cost estimate
# is ~$0.20 per run.

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "anthropic"
  id: "claude-sonnet-4-6"
  api_key: ""              # empty => read from $ANTHROPIC_API_KEY
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/cmac_full_sonnet_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_full_sonnet_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_full_sonnet_lint.json"
