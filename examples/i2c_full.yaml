# I2C-Master — SpecGuard full pipeline (with RTL facts) — for the I2C
# sanity-check experiment that compares against the AssertLLM paper's
# Table 2 row.

design:
  rtl_dir: "./i2c_test/rtl"
  top_file: "i2c_master_top.v"
  top_module: "i2c_master_top"
  docs_dir: "./i2c_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  allow_pyslang_warnings: true

  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  enable_deterministic_repair: true

  use_hallucination_denylist: false

output:
  sva_file: "./i2c_test/i2c_specguard_full_sva.sv"
  log_file: "./i2c_test/i2c_specguard_full_log.txt"
  lint_report: "./i2c_test/i2c_specguard_full_lint.json"
