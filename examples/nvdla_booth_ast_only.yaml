# NVDLA Booth Recoder — AST-only (no LLM, deterministic)
# Generates assertions from RTL structure in <1 second

design:
  rtl_dir: "./nvdla_cmac_test/booth_rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_booth.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_booth"

model:
  # ast_only=true means the model is never loaded — backend kept for
  # consistency with non-ast_only configs.
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

agent:
  use_ast_assertions: true
  ast_only: true
  use_rtl_facts: true
  module_facts_mode: "lazy"
  module_scope_depth: 2

output:
  sva_file: "./nvdla_cmac_test/booth_sva_ast_only.sv"
  lint_report: "./nvdla_cmac_test/booth_lint_ast_only.json"

mutation_testing:
  enabled: true
  simulator: "xsim"
  sim_cycles: 200
  max_workers: 4
  dut_files:
    - "NV_NVDLA_CMAC_CORE_MAC_booth.v"
  report_file: "./nvdla_cmac_test/booth_mutation_ast_only.json"
