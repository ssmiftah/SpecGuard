# NVDLA CACC — Ablation A1: Remove RTL facts card
# Disables the structured "RTL Facts" block injected into the system
# prompt. AST skeletons, module scoping (vacuous now), Phase 1 repair,
# and the lint feedback loop all remain ON. Compare token totals and
# ACR vs nvdla_cacc_full.yaml.

design:
  rtl_dir: "./nvdla_cacc_test/rtl"
  top_module: "NV_NVDLA_cacc"
  docs_dir: "./nvdla_cacc_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true

  allow_pyslang_warnings: true

  use_rtl_facts: false           # <-- ablation knob
  module_facts_mode: "off"       # facts off implies scoping is vacuous

  enable_deterministic_repair: true
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cacc_test/cacc_ablation_no_facts_sva.sv"
  log_file: "./nvdla_cacc_test/cacc_ablation_no_facts_log.txt"
  lint_report: "./nvdla_cacc_test/cacc_ablation_no_facts_lint.json"
