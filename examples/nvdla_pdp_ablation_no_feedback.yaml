# NVDLA PDP — Ablation A5: disable repair AND refinement loop.
# Top module: NV_NVDLA_pdp
# RTL dir:    ./nvdla_pdp_test/rtl
# See docs/ablation_findings_cacc.md for the ablation matrix rationale.

design:
  rtl_dir: "./nvdla_pdp_test/rtl"
  top_file: "NV_NVDLA_pdp.v"
  top_module: "NV_NVDLA_pdp"
  docs_dir: "./nvdla_pdp_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  allow_pyslang_warnings: true

  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  enable_deterministic_repair: false
  max_refinement_iterations: 0

  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_pdp_test/pdp_ablation_no_feedback_sva.sv"
  log_file: "./nvdla_pdp_test/pdp_ablation_no_feedback_log.txt"
  lint_report: "./nvdla_pdp_test/pdp_ablation_no_feedback_lint.json"
