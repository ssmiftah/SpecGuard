# CMAC Multiplier — Stage 2 A/B test config (LOCAL backend)
# Same setup as nvdla_cmac_ast_llm.yaml, but with RTL facts injected
# into the LLM system prompt. Output paths differ so this run does NOT
# overwrite the baseline AST+LLM outputs.
#
# A/B test recipe:
#   1. Run baseline (no facts):
#        python main.py examples/nvdla_cmac_ast_llm.yaml 2>&1 | tee cmac_baseline_run.log
#   2. Run augmented (this file):
#        python main.py examples/nvdla_cmac_facts_local.yaml 2>&1 | tee cmac_facts_run.log
#   3. Compare:
#        python ab_compare.py \
#            nvdla_cmac_test/cmac_ast_llm \
#            nvdla_cmac_test/cmac_facts \
#            cmac_baseline_run.log \
#            cmac_facts_run.log

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true

  # Stage 2 — RTL facts prompt augmentation (the variable under test)
  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500

  module_facts_mode: "lazy"
  module_scope_depth: 2

  # Hallucination knowledgebase: logging is always-on (cheap, builds the
  # dataset). Injection into the prompt is gated below — leave OFF for
  # the first A/B run so we measure the facts effect in isolation.
  use_hallucination_denylist: false
  hallucination_denylist_top_n: 5
  hallucination_denylist_dir: "indices/hallucinations"

output:
  sva_file: "./nvdla_cmac_test/cmac_facts_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_facts_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_facts_lint.json"
