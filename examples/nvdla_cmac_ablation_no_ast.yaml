# NVDLA CMAC — Ablation A3: Remove AST skeletons
# AST extraction disabled; the LLM has to derive every assertion from
# scratch. Facts + scoping + repair + lint loop all remain ON.

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: false      # <-- ablation knob
  ast_only: false
  use_dataflow_check: true

  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2

  enable_deterministic_repair: true
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/cmac_ablation_no_ast_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_ablation_no_ast_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_ablation_no_ast_lint.json"
