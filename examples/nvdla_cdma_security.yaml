# NVDLA CDMA — full
# Top: NV_NVDLA_cdma  RTL: ./nvdla_cdma_test

design:
  rtl_dir: "./nvdla_cdma_test/rtl"
  top_file: "NV_NVDLA_cdma.v"
  top_module: "NV_NVDLA_cdma"
  docs_dir: "./nvdla_cdma_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  allow_pyslang_warnings: true

  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  enable_deterministic_repair: true

  use_hallucination_denylist: false

security:
  pass_enabled: true
  threat_model: "./nvdla_cdma_test/docs/security_threats.md"
  max_scenarios: 0  # 0 = no cap; runs every CWE section in the threat model

output:
  sva_file: "./nvdla_cdma_test/cdma_security_sva.sv"
  log_file: "./nvdla_cdma_test/cdma_security_log.txt"
  lint_report: "./nvdla_cdma_test/cdma_security_lint.json"
