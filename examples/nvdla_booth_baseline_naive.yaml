# NVDLA Booth Recoder — Naive baseline (single-prompt LLM)
#
# This config measures the token cost of a one-shot LLM-for-SVA approach
# where the model sees the full RTL + docs in a single prompt and emits
# all assertions at once. No AST extraction, no facts, no scoping.
# Paired with nvdla_booth_full.yaml for cost comparison.

design:
  rtl_dir: "./nvdla_cmac_test/booth_rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_booth.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_booth"
  docs_dir: "./nvdla_cmac_test/booth_docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  # Naive baseline: disable every pipeline optimisation.
  naive_baseline: true
  use_ast_assertions: false
  ast_only: false
  use_dataflow_check: false
  use_rtl_facts: false
  module_facts_mode: "off"
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/booth_baseline_naive_sva.sv"
  log_file: "./nvdla_cmac_test/booth_baseline_naive_log.txt"
  lint_report: "./nvdla_cmac_test/booth_baseline_naive_lint.json"
