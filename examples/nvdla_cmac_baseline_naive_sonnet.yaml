# NVDLA CMAC — Naive baseline with Claude Sonnet 4.6 (Anthropic API)
# Paired with nvdla_cmac_full_sonnet.yaml for cost comparison across the
# same backend (isolates the pipeline contribution).

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "anthropic"
  id: "claude-sonnet-4-6"
  api_key: ""              # empty => read from $ANTHROPIC_API_KEY
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  naive_baseline: true
  use_ast_assertions: false
  ast_only: false
  use_dataflow_check: false
  use_rtl_facts: false
  module_facts_mode: "off"
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_cmac_test/cmac_baseline_naive_sonnet_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_baseline_naive_sonnet_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_baseline_naive_sonnet_lint.json"
