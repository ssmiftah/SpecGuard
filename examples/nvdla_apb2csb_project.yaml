# NVDLA APB-to-CSB bridge — clocked design, concurrent assertions

design:
  rtl_dir: "./RTL Cases/NVDLA_hw/vmod/nvdla/apb2csb"
  top_module: "NV_NVDLA_apb2csb"
  docs_dir: "./nvdla_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true
  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500
  module_facts_mode: "lazy"
  module_scope_depth: 2
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_test/sva_output.sv"
