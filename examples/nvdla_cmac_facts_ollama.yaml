# CMAC Multiplier — Stage 2 with Ollama backend
# Same design + RTL facts as nvdla_cmac_facts_local.yaml, but served
# by Ollama for prefix caching benefits.
#
# Prerequisites:
#   ollama pull qwen3:14b
#   ollama create qwen3:14b-32k -f <Modelfile with num_ctx 32768>
#
# Run:
#   python main.py examples/nvdla_cmac_facts_ollama.yaml 2>&1 | tee cmac_ollama_run.log

design:
  rtl_dir: "./nvdla_cmac_test/rtl"
  top_file: "NV_NVDLA_CMAC_CORE_MAC_mul.v"
  top_module: "NV_NVDLA_CMAC_CORE_MAC_mul"
  docs_dir: "./nvdla_cmac_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true

  # Stage 2 — RTL facts prompt augmentation
  use_rtl_facts: true
  rtl_facts_soft_budget: 1000
  rtl_facts_hard_budget: 1500

  # Stage 3 — module-scoped facts ("lazy" or "full", default "off")
  module_facts_mode: "lazy"
  module_scope_depth: 2

  use_hallucination_denylist: false
  hallucination_denylist_top_n: 5
  hallucination_denylist_dir: "indices/hallucinations"

output:
  sva_file: "./nvdla_cmac_test/cmac_ollama_sva.sv"
  log_file: "./nvdla_cmac_test/cmac_ollama_log.txt"
  lint_report: "./nvdla_cmac_test/cmac_ollama_lint.json"
