# NVDLA RUBIK — Naive baseline (single-prompt LLM)
# Paired with nvdla_rubik_full.yaml for cost comparison.

design:
  rtl_dir: "./nvdla_rubik_test/rtl"
  top_file: "NV_NVDLA_rubik.v"
  top_module: "NV_NVDLA_rubik"
  docs_dir: "./nvdla_rubik_test/docs"

model:
  backend: "openai"
  id: "qwen3:14b-32k"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 2048

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  naive_baseline: true
  use_ast_assertions: false
  ast_only: false
  use_dataflow_check: false
  use_rtl_facts: false
  module_facts_mode: "off"
  allow_pyslang_warnings: true
  use_hallucination_denylist: false

output:
  sva_file: "./nvdla_rubik_test/rubik_baseline_naive_sva.sv"
  log_file: "./nvdla_rubik_test/rubik_baseline_naive_log.txt"
  lint_report: "./nvdla_rubik_test/rubik_baseline_naive_lint.json"
