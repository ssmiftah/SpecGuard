# Coral FifoX — Ablation A1: Remove RTL facts card
# Disables the structured "RTL Facts" block injected into the system
# prompt. AST skeletons, Phase 1 repair, and the lint feedback loop
# all remain ON.

design:
  rtl_dir: "./coral_test/chisel_rtl"
  top_module: "FifoX"
  docs_dir: "./coral_test/docs"

model:
  backend: "openai"
  id: "qwen3:35b-bf16"
  api_base: "http://localhost:11434/v1"
  api_key: "ollama"
  temperature: 0.1
  max_new_tokens: 16384

retrieval:
  rtl_max_chunk_chars: 1500
  encoder_batch_size: 8
  rtl_top_k: 3
  doc_top_k: 3

agent:
  use_ast_assertions: true
  ast_only: false
  use_dataflow_check: true

  use_rtl_facts: false           # <-- ablation knob
  module_facts_mode: "off"

  enable_deterministic_repair: true
  use_hallucination_denylist: false

output:
  sva_file: "./coral_test/fifox_ablation_no_facts_qwen35b_sva.sv"
  log_file: "./coral_test/fifox_ablation_no_facts_qwen35b_log.txt"
  lint_report: "./coral_test/fifox_ablation_no_facts_qwen35b_lint.json"
